<nav class="navbar navbar-expand-lg navbar-dark" style="background-color: var(--bg-dark); border-bottom: 1px solid rgba(255,255,255,0.1);">
  <div class="container">
    <a class="navbar-brand" routerLink="/home" style="color: var(--primary); font-weight: 700;">Worldin</a>
    <div class="d-flex align-items-center">
      <a *ngIf="isGerente" routerLink="/intercambio-novo" class="btn btn-outline-custom me-3 btn-sm">Novo Intercâmbio</a>
      <a routerLink="/profile" class="btn btn-outline-light me-3 btn-sm">
        <i class="bi bi-person-circle me-1"></i>Perfil
      </a>
      <button class="btn btn-danger btn-sm" (click)="logout()">Sair</button>
    </div>
  </div>
</nav>

<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 style="font-weight: 600;">Explorar Intercâmbios</h3>
    <div class="btn-group" role="group">
      <button type="button" class="btn" [ngClass]="{'btn-primary-custom': viewMode === 'cards', 'btn-outline-secondary text-light': viewMode !== 'cards'}" (click)="toggleView('cards')">
        <i class="bi bi-grid"></i> Cards
      </button>
      <button type="button" class="btn" [ngClass]="{'btn-primary-custom': viewMode === 'map', 'btn-outline-secondary text-light': viewMode !== 'map'}" (click)="toggleView('map')">
        <i class="bi bi-map"></i> Mapa
      </button>
    </div>
  </div>

  <!-- Filter Bar -->
  <div class="filters-bar glass-card p-3 mb-4 d-flex gap-3 align-items-center">
    <input
      type="text"
      class="form-control form-control-custom"
      placeholder="Buscar por país, cidade ou instituição..."
      [(ngModel)]="searchQuery"
      (input)="applyFilters()"
    >
    <select class="form-select form-control-custom" style="max-width: 200px;" [(ngModel)]="priceRange" (change)="applyFilters()">
      <option value="">Faixa de Preço</option>
      <option value="1">Até R$ 10.000</option>
      <option value="2">R$ 10.000 - R$ 20.000</option>
      <option value="3">Acima de R$ 20.000</option>
    </select>
    <button class="btn btn-outline-custom btn-sm" (click)="clearFilters()" *ngIf="searchQuery || priceRange">
      <i class="bi bi-x-circle"></i> Limpar
    </button>
  </div>

  <!-- Cards View -->
  <div *ngIf="viewMode === 'cards'" class="row g-4">
    <div class="col-md-4" *ngFor="let item of filteredIntercambios">
      <div class="glass-card card h-100 bg-transparent border-0 overflow-hidden">
        <div class="card-img-wrapper" style="height: 200px; overflow: hidden; background: #1a1a1a;">
          <img
            *ngIf="item.imagem"
            [src]="item.imagem"
            class="card-img-top"
            alt="Imagem do intercâmbio"
            style="height: 200px; object-fit: cover; width: 100%;"
          >
          <div *ngIf="!item.imagem" class="d-flex align-items-center justify-content-center h-100" style="background: linear-gradient(135deg, #3c3c3c, #1a1a1a);">
            <i class="bi bi-globe-americas" style="font-size: 3rem; color: var(--primary); opacity: 0.5;"></i>
          </div>
        </div>
        <div class="card-body">
          <h5 class="card-title" style="font-weight: 600; color: var(--primary);">{{ item.titulo }}</h5>
          <p class="card-text text-secondary mb-1"><i class="bi bi-geo-alt"></i> {{ item.cidade }}, {{ item.pais }}</p>
          <p *ngIf="item.instituicao" class="card-text text-secondary mb-1" style="font-size: 0.85rem;">
            <i class="bi bi-building"></i> {{ item.instituicao }}
          </p>
          <!-- Star Rating -->
          <div class="mb-2">
            <span *ngFor="let star of getStars(item.mediaNotas)" class="star-icon">
              <i class="bi" [ngClass]="{
                'bi-star-fill text-warning': star === 1,
                'bi-star-half text-warning': star === 0.5,
                'bi-star text-secondary': star === 0
              }"></i>
            </span>
            <span class="text-secondary small ms-1">({{ item.totalAvaliacoes }})</span>
          </div>
          <p class="card-text mb-3" style="font-weight: 600; font-size: 1.1rem;">R$ {{ item.preco | number:'1.2-2' }}</p>
          <a [routerLink]="['/intercambio', item.id_intercambio]" class="btn btn-outline-custom w-100">Ver Mais</a>
        </div>
      </div>
    </div>

    <div *ngIf="filteredIntercambios.length === 0" class="col-12 text-center py-5">
      <i class="bi bi-search" style="font-size: 3rem; color: var(--primary); opacity: 0.5;"></i>
      <p class="text-secondary mt-3">Nenhum intercâmbio encontrado.</p>
    </div>
  </div>

  <!-- Map View -->
  <div *ngIf="viewMode === 'map'" class="glass-card p-2">
    <div id="map" style="height: 600px; border-radius: 8px;"></div>
  </div>
</div>
